<!DOCTYPE html>
<html lang="en">
<head>

  <title>Uiverse Demo</title>
  <link rel="stylesheet" href="style.css">

<body>
  <div class="container">

    <!-- Button 1 -->
    <button class="simple-btn">Click Me</button>

    <!-- Button 2 -->
    <button class="animated-btn" alt="saadi safdar">
      <i>s</i><i>a</i><i>a</i><i>d</i><i>i</i><i>&nbsp;</i>
      <i>s</i><i>a</i><i>f</i><i>d</i><i>a</i><i>r</i>
    </button>

    <!-- Switch -->
    <label class="switch">
      <input type="checkbox">
      <span class="slider"></span>
      <img src="off.png" class="off">
      <img src="on.png" class="on">
    </label>

    <!-- Gradient Button -->
    <button class="gradient-btn">
      <span>Button</span>
    </button>

    <!-- Radio Group -->
    <div class="custom-radio-group">
      <form>
        <label class="radio-label">
          <input type="radio" name="band" value="am" checked class="radio-input">
          <span>AM</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="band" value="fm" class="radio-input">
          <span>FM</span>
        </label>
      </form>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-content">
        <p class="card-title">Card hover effect</p>
        <p class="card-para">The harder you work for something, the greater you'll feel when you achieve it.</p>
      </div>
    </div>

    <!-- Glow Button -->
    <button class="glow-btn">Hover Me</button>

    <!-- search-container -->
    <div class="container">
        <div class="search-container">
        <input class="input" type="text">
        <svg viewBox="0 0 24 24" class="search__icon">
        <g>

        </path>
        </g>
        </svg>
    </div>
    </div>
